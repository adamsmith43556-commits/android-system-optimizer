buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.0.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// This defines the "app" part of your project
project(':app') {
    apply plugin: 'com.android.application'
    
    android {
        namespace 'com.sensimax.booster'
        compileSdk 33
        
        defaultConfig {
            applicationId "com.sensimax.booster"
            minSdk 24
            targetSdk 33
            versionCode 1
            versionName "1.0"
        }
    }
}
