name: Build Sensi-Max Booster APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Basic Project Structure
        run: |
          mkdir -p app/src/main
          if [ ! -f build.gradle ]; then
            echo "plugins { id 'com.android.application' version '8.0.2' }" > build.gradle
          fi

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace || true

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Sensi-Max-Booster-Build
          path: "**/*.apk"
